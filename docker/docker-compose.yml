# Local / single-host run of SAM Slide Suite.
#
#   docker compose -f docker/docker-compose.yml up --build
#
# Build context is the repo root (..), so the image can see scripts/ personas/ web/.
# Ollama is bundled INSIDE the app container (with the llama3.1:8b model baked in),
# so there is no separate Ollama service to run. To use an external Ollama instead,
# set OLLAMA_URL to its address (the entrypoint then skips the in-container one).

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: sam-studio:latest
    ports:
      - "3001:3001"
      # - "11434:11434"   # uncomment to reach the bundled Ollama directly
    environment:
      PORT: "3001"
      # Bundled Ollama on localhost inside the container; override for external.
      OLLAMA_URL: "http://localhost:11434"
      # Optionally pull an extra model at startup, e.g. "llama3.2:3b".
      # OLLAMA_PULL: "llama3.2:3b"
    volumes:
      # Persist generated artifacts and the Ollama model store across restarts.
      # The model volume is seeded from the baked image layer on first run, so
      # the baked model is already present (do NOT switch this to a bind mount,
      # which would shadow it).
      - sam-uploads:/app/web/uploads
      - sam-outputs:/app/web/outputs
      - sam-reviews:/app/reviews
      - sam-models:/opt/ollama/models
    restart: unless-stopped
    # For GPU hosts, uncomment to expose NVIDIA GPUs to the bundled Ollama:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  sam-uploads:
  sam-outputs:
  sam-reviews:
  sam-models:
