<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SAM Slide Suite — Review &amp; Rewrite Walkthrough</title>
<style>
  :root {
    --bg: #eaf4fb;
    --bg-2: #d7ecfa;
    --panel: #ffffff;
    --ink: #0f2c44;
    --ink-soft: #4a6b80;
    --accent: #1e88e5;
    --accent-soft: #4fc3f7;
    --accent-ink: #0d47a1;
    --border: #bcdcf2;
    --shadow: 0 6px 24px rgba(30, 136, 229, 0.18);
    --radius: 14px;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--ink);
    background: linear-gradient(160deg, var(--bg) 0%, var(--bg-2) 100%);
    display: flex; flex-direction: column; height: 100vh;
  }

  /* top bar */
  header {
    display: flex; align-items: center; gap: 16px;
    padding: 12px 22px; background: var(--panel);
    border-bottom: 1px solid var(--border);
  }
  header .logo { font-weight: 800; font-size: 18px; color: var(--accent-ink); }
  header .logo span { color: var(--accent-soft); }
  header .sub { color: var(--ink-soft); font-size: 13px; }
  header .counter { margin-left: auto; font-variant-numeric: tabular-nums; color: var(--accent-ink); font-weight: 700; }

  /* stage */
  main { flex: 1; min-height: 0; display: flex; flex-direction: column; align-items: center; padding: 18px 22px 6px; overflow: hidden; }
  .badge {
    align-self: center; font-size: 12px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase;
    color: #fff; background: var(--accent); padding: 3px 12px; border-radius: 999px; margin-bottom: 8px;
  }
  .badge.rewrite { background: #7e57c2; }
  .badge.intro { background: var(--accent-ink); }
  h1.slide-title { margin: 0 0 12px; font-size: 24px; text-align: center; color: var(--accent-ink); }
  .frame {
    background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 10px; max-height: 60vh; max-width: 1100px; width: 100%;
    display: flex; align-items: center; justify-content: center;
  }
  .frame img { max-width: 100%; max-height: calc(60vh - 20px); border-radius: 8px; display: block; }
  .caption { max-width: 920px; text-align: center; color: var(--ink-soft); font-size: 14px; line-height: 1.55; margin: 12px auto 0; }
  .caption code { font-family: "JetBrains Mono", ui-monospace, monospace; font-size: 12.5px; background: #e3f2fd; color: var(--accent-ink); padding: 1px 5px; border-radius: 4px; }

  /* intro slide */
  .intro-card { max-width: 760px; text-align: center; }
  .intro-card .meta { display: inline-grid; grid-template-columns: auto auto; gap: 6px 18px; text-align: left; margin-top: 14px; background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 22px; box-shadow: var(--shadow); }
  .intro-card .meta dt { color: var(--ink-soft); font-size: 13px; }
  .intro-card .meta dd { margin: 0; font-weight: 600; font-size: 13px; }

  /* controls */
  .controls { display: flex; align-items: center; justify-content: center; gap: 14px; padding: 8px; }
  .controls button {
    background: var(--accent); color: #fff; border: none; border-radius: 10px;
    padding: 9px 18px; font-size: 14px; font-weight: 600; cursor: pointer; box-shadow: var(--shadow);
  }
  .controls button:hover { background: var(--accent-ink); }
  .controls button:disabled { opacity: .4; cursor: not-allowed; box-shadow: none; }
  .controls .pos { color: var(--ink-soft); font-size: 13px; min-width: 90px; text-align: center; }

  /* thumbnails */
  .thumbs { display: flex; gap: 8px; overflow-x: auto; padding: 10px 16px 16px; background: var(--panel); border-top: 1px solid var(--border); }
  .thumb {
    flex: 0 0 auto; width: 132px; cursor: pointer; border: 2px solid transparent; border-radius: 10px;
    background: var(--bg); padding: 5px; transition: border-color .15s, transform .15s;
  }
  .thumb:hover { transform: translateY(-2px); }
  .thumb.active { border-color: var(--accent); box-shadow: var(--shadow); }
  .thumb .tw { height: 74px; border-radius: 6px; overflow: hidden; background: #cfe6f8; display: flex; align-items: center; justify-content: center; }
  .thumb.intro .tw { font-size: 26px; color: var(--accent-ink); font-weight: 800; }
  .thumb img { width: 100%; height: 100%; object-fit: cover; object-position: top; }
  .thumb .lbl { font-size: 11px; color: var(--ink-soft); margin-top: 5px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .thumb.active .lbl { color: var(--accent-ink); font-weight: 700; }

  @media (max-width: 720px) {
    .thumb { width: 104px; } .thumb .tw { height: 58px; }
    h1.slide-title { font-size: 19px; }
  }
</style>
</head>
<body>
  <header>
    <div class="logo">SAM Slide Suite <span>·</span> UI Walkthrough</div>
    <div class="sub">Review &amp; Rewrite</div>
    <div class="counter" id="counter">1 / 10</div>
  </header>

  <main id="stage"><!-- rendered by JS --></main>

  <div class="controls">
    <button id="prev">‹ Prev</button>
    <div class="pos" id="pos"></div>
    <button id="next">Next ›</button>
  </div>

  <div class="thumbs" id="thumbs"></div>

<script>
const SLIDES = [
  {
    intro: true, section: 'intro', badge: 'Walkthrough', title: 'Review & Rewrite Walkthrough',
    meta: {
      'Document': 'AI-Powered Acquisition Document Processing Pipeline.pptx',
      'Model': 'local Ollama (kimi-k2.6:cloud)',
      'Review panel': 'Skeptic-Proof · Executive Briefing · Legal/Compliance',
      'Rewrite': 'Executive Briefing, with Advise enabled',
    },
    caption: 'A stage-by-stage tour of the Review and Rewrite workflows, captured from real runs. Use ← / → or the thumbnails to navigate.',
  },
  { section: 'review', badge: 'Review', img: 'ui/01-review-empty.png', label: 'Empty state',
    title: 'Review · Empty state',
    caption: 'Pick the Review tab and the right panel explains the flow while you configure the left panel.' },
  { section: 'review', badge: 'Review', img: 'ui/02-review-config.png', label: 'Configured',
    title: 'Review · Configured',
    caption: 'The deck is uploaded and confirmed. In Review mode personas are multi-select with Select All / Clear; three are chosen here. The Model picker shows the detected Ollama model with a refresh (⟳) button.' },
  { section: 'review', badge: 'Review', img: 'ui/03-review-running.png', label: 'Running',
    title: 'Review · Running',
    caption: 'On Run Review, each persona streams status (queued → running → done) over SSE, with a progress bar and a live log showing extraction and the auto-detected model context window.' },
  { section: 'review', badge: 'Review', img: 'ui/04-review-results.png', label: 'Results',
    title: 'Review · Results (synthesis)',
    caption: 'A synthesis pass merges the reviews: consensus findings, conflicts weighted by each persona’s blind spots, unique catches, and a top-5 priority-fix list — followed by one tab per persona.' },
  { section: 'review', badge: 'Review', img: 'ui/05-review-compare.png', label: 'Compare',
    title: 'Review · Compare overlay',
    caption: 'The Compare overlay puts any two reports side by side, each pane scrolling independently, for quick cross-persona reading.' },
  { section: 'rewrite', badge: 'Rewrite', img: 'ui/06-rewrite-config.png', label: 'Configured',
    title: 'Rewrite · Configured',
    caption: 'Switching to Rewrite keeps the same document. Personas become single-select (radio). The Rewrite-only 🧩 Advise toggle is enabled, so the persona drafts proposed content for each gap the review flagged.' },
  { section: 'rewrite', badge: 'Rewrite', img: 'ui/07-rewrite-running.png', label: 'Running',
    title: 'Rewrite · Running',
    caption: 'Run Rewrite streams progress while the persona rewrites the whole deck, automatically folding in the prior review’s findings for this document.' },
  { section: 'rewrite', badge: 'Rewrite', img: 'ui/08-rewrite-results.png', label: 'Results',
    title: 'Rewrite · Results',
    caption: 'Each slide becomes a tab with rewritten content and speaker notes. Review-surfaced gaps appear as amber NEEDS: markers; with Advise on, each is followed by a purple DRAFT: proposal — labeled, unverified starting points. Export PPTX / DOCX are below.' },
  { section: 'rewrite', badge: 'Rewrite', img: 'ui/09-rewrite-slide.png', label: 'Slide detail',
    title: 'Rewrite · Another slide',
    caption: 'Stepping through the slide tabs shows the same structure per slide — rewritten content, speaker notes, and any NEEDS / DRAFT markers.' },
];

let i = 0;
const stage = document.getElementById('stage');
const counter = document.getElementById('counter');
const pos = document.getElementById('pos');
const prev = document.getElementById('prev');
const next = document.getElementById('next');
const thumbs = document.getElementById('thumbs');

function render() {
  const s = SLIDES[i];
  if (s.intro) {
    const rows = Object.entries(s.meta).map(([k, v]) => `<dt>${k}</dt><dd>${v}</dd>`).join('');
    stage.innerHTML = `
      <div class="badge intro">${s.badge}</div>
      <div class="intro-card">
        <h1 class="slide-title">${s.title}</h1>
        <dl class="meta">${rows}</dl>
        <p class="caption">${s.caption}</p>
      </div>`;
  } else {
    stage.innerHTML = `
      <div class="badge ${s.section}">${s.badge}</div>
      <h1 class="slide-title">${s.title}</h1>
      <div class="frame"><img src="${s.img}" alt="${s.title}" /></div>
      <p class="caption">${s.caption}</p>`;
  }
  counter.textContent = `${i + 1} / ${SLIDES.length}`;
  pos.textContent = `${i + 1} of ${SLIDES.length}`;
  prev.disabled = i === 0;
  next.disabled = i === SLIDES.length - 1;
  [...thumbs.children].forEach((t, idx) => t.classList.toggle('active', idx === i));
  const active = thumbs.children[i];
  if (active) active.scrollIntoView({ block: 'nearest', inline: 'center', behavior: 'smooth' });
}

function go(n) { i = Math.max(0, Math.min(SLIDES.length - 1, n)); render(); }

SLIDES.forEach((s, idx) => {
  const el = document.createElement('div');
  el.className = 'thumb' + (s.intro ? ' intro' : '');
  el.innerHTML = `
    <div class="tw">${s.intro ? '★' : `<img src="${s.img}" alt="">`}</div>
    <div class="lbl">${idx + 1}. ${s.intro ? 'Intro' : s.badge + ' — ' + s.label}</div>`;
  el.addEventListener('click', () => go(idx));
  thumbs.appendChild(el);
});

prev.addEventListener('click', () => go(i - 1));
next.addEventListener('click', () => go(i + 1));
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'PageDown') go(i + 1);
  else if (e.key === 'ArrowLeft' || e.key === 'PageUp') go(i - 1);
  else if (e.key === 'Home') go(0);
  else if (e.key === 'End') go(SLIDES.length - 1);
});

render();
</script>
</body>
</html>
